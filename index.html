<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wild Board Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff; --bg2: #f2f2f2; --bg3: #e4e4e4;
      --text: #111111; --text2: #666666; --text3: #aaaaaa;
      --border: #dddddd; --border2: #bbbbbb;
      --red: #cc2200; --blue: #007aff; --green: #248a3d;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
        --text: #f2f2f7; --text2: #aeaeb2; --text3: #6c6c70;
        --border: #3a3a3c; --border2: #555555;
        --red: #ff453a; --green: #30d158;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg2); color: var(--text);
      padding: 14px; font-size: 16px; -webkit-text-size-adjust: 100%;
    }
    .wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
    .sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }

    input[type=text], input[type=number] {
      font-size: 16px; padding: 9px 8px;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text);
      width: 100%; -webkit-appearance: none; appearance: none; min-height: 40px;
    }
    input[type=number] { text-align: center; }
    input::placeholder { color: var(--text3); }
    input:focus { outline: 2px solid var(--blue); outline-offset: -1px; }

    .btn {
      font-size: 15px; padding: 9px 14px;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text);
      cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; white-space: nowrap; min-height: 40px;
    }
    .btn:active { opacity: 0.6; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-sm { font-size: 14px; padding: 7px 12px; min-height: 36px; }
    .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-outline { background: transparent; color: var(--blue); border-color: var(--blue); }

    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--red); font-size: 20px; font-weight: 400;
      padding: 0 4px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      min-width: 28px; min-height: 40px; flex-shrink: 0;
    }
    .del-btn:active { opacity: 0.5; }

    .project-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
    .project-bar > .title-wrap { flex: 1; min-width: 0; }

    .ititle {
      font-size: 16px; font-weight: 400; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg); cursor: pointer; color: var(--text3);
      display: block; width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-height: 40px; line-height: 1.4;
    }
    .ititle.has-value { color: var(--text); font-weight: 600; }
    .ititle-input {
      font-size: 16px; font-weight: 600; padding: 8px 10px;
      border: 1px solid var(--blue); border-radius: var(--radius);
      background: var(--bg); color: var(--text);
      width: 100%; display: none; min-height: 40px;
    }

    .species-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    }
    .species-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .species-header .title-wrap { flex: 1; min-width: 0; }
    .species-footer {
      display: flex; justify-content: space-between;
      padding-top: 10px; border-top: 1px solid var(--border);
      margin-top: 10px; font-size: 13px; color: var(--text2);
      flex-wrap: wrap; gap: 4px;
    }
    .species-footer strong { color: var(--text); }

    .t-block {
      background: var(--bg2); border-radius: var(--radius);
      padding: 12px; margin-bottom: 10px; border: 1px solid var(--border);
    }
    .t-meta {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .t-meta-del { margin-left: auto; flex-shrink: 0; }
    .t-meta-field { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); flex-shrink: 0; }
    .t-wrap {
      display: flex; align-items: center;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); overflow: hidden; width: 80px; min-height: 40px;
    }
    .t-wrap input {
      border: none; background: transparent;
      width: 42px; padding: 9px 2px 9px 8px;
      font-size: 16px; color: var(--text); text-align: right;
    }
    .t-wrap input:focus { outline: none; }
    .t-suffix { font-size: 15px; color: var(--text2); padding: 0 7px 0 3px; user-select: none; }
    .p-wrap {
      display: flex; align-items: center;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); overflow: hidden; min-height: 40px; width: 110px;
    }
    .p-prefix { padding: 0 3px 0 10px; font-size: 15px; color: var(--text2); flex-shrink: 0; }
    .p-wrap input {
      border: none; background: transparent;
      width: 100%; padding: 9px 8px 9px 0;
      font-size: 16px; color: var(--text); text-align: right;
    }
    .p-wrap input:focus { outline: none; }
    .t-meta-spacer { flex: 1; display: none; }

    .b-heads {
      display: grid;
      grid-template-columns: 60px 1fr 1fr 1fr;
      gap: 5px; margin-bottom: 6px;
      font-size: 11px; color: var(--text2); text-align: center;
    }
    .b-row {
      display: grid;
      grid-template-columns: 60px 1fr 1fr 1fr;
      gap: 5px; align-items: center; margin-bottom: 4px;
    }
    .b-row-right { display: flex; align-items: center; gap: 5px; }
    .b-row-right .suffix-wrap { flex: 1; }
    .b-label { font-size: 13px; font-weight: 600; color: var(--text2); display: flex; align-items: center; min-height: 40px; padding: 0 2px; }
    .suffix-wrap { display: flex; align-items: center; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); overflow: hidden; min-height: 40px; }
    .suffix-wrap input { border: none; background: transparent; padding: 9px 2px 9px 6px; font-size: 16px; color: var(--text); text-align: right; width: 100%; min-width: 0; }
    .suffix-wrap input:focus { outline: none; }
    .suffix-mark { font-size: 13px; color: var(--text2); padding: 0 5px 0 1px; user-select: none; flex-shrink: 0; }
    .edit-bar { display: flex; gap: 8px; align-items: center; padding: 10px 14px; background: var(--bg3); border-radius: var(--radius); margin-bottom: 14px; font-size: 13px; color: var(--text2); }
    .edit-bar strong { color: var(--text); flex: 1; }
    .b-result { font-size: 12px; color: var(--text2); font-weight: 600; padding: 2px 2px 8px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
    .b-result:last-child { border-bottom: none; }
    .b-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .t-footer {
      display: flex; justify-content: space-between;
      padding-top: 8px; border-top: 1px solid var(--border);
      margin-top: 8px; font-size: 13px; color: var(--text2);
    }
    .t-footer strong { color: var(--text); }

    .totals-panel {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-top: 12px;
    }
    .totals-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 14px; }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
    .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    .metric-value { font-size: 20px; font-weight: 700; }

    .divider { height: 1px; background: var(--border); margin: 18px 0; }

    /* Saved projects */
    .saved-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    }
    .saved-summary {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; gap: 8px; cursor: pointer;
    }
    .saved-summary:active { background: var(--bg2); }
    .saved-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .saved-meta { font-size: 12px; color: var(--text2); }
    .saved-chevron { font-size: 18px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
    .saved-chevron.open { transform: rotate(180deg); }
    .saved-actions { display: none; flex-wrap: wrap; gap: 8px; padding: 0 12px 12px; }
    .saved-actions.open { display: flex; }
    .saved-detail {
      display: none; padding: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px; color: var(--text2);
    }
    .saved-detail.open { display: block; }
    .detail-species { margin-bottom: 10px; }
    .detail-species-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .detail-thick { margin-bottom: 8px; padding: 8px; background: var(--bg2); border-radius: var(--radius); }
    .detail-thick-head { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
    .detail-board-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .detail-board-row:last-child { border-bottom: none; }

    /* Save modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg); border-radius: var(--radius);
      padding: 20px; width: 100%; max-width: 340px;
    }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
    .modal-btns { display: flex; flex-direction: column; gap: 8px; }

    .empty { font-size: 14px; color: var(--text2); }
    .actions { margin: 12px 0; }
    .budget-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .budget-row label { font-size: 13px; color: var(--text2); white-space: nowrap; }
    .budget-wrap { display: flex; align-items: center; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); overflow: hidden; flex: 1; min-height: 40px; }
    .budget-prefix { padding: 0 3px 0 10px; font-size: 15px; color: var(--text2); flex-shrink: 0; }
    .budget-wrap input { border: none; background: transparent; width: 100%; padding: 9px 10px 9px 0; font-size: 16px; color: var(--text); text-align: right; }
    .budget-wrap input:focus { outline: none; }
    .budget-alert { display: none; background: #fff3f3; border: 1px solid var(--red); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: var(--red); }
    .budget-alert.show { display: block; }
    @media (prefers-color-scheme: dark) { .budget-alert { background: #2a1010; } }
  </style>
</head>
<body>
<div class="wrap">

  <h1>Wild Board Calculator</h1>
  <p class="sub">Lumber board foot calculator by Wild Board Studio</p>

  <div class="project-bar">
    <div class="title-wrap" id="proj-wrap"></div>
    <button class="btn btn-primary" id="save-btn">Save</button>
  </div>

  <div id="edit-bar" style="display:none" class="edit-bar"><strong id="edit-label">Editing project</strong><button class="btn btn-sm" id="cancel-edit">Cancel</button></div>
  <div id="species-list"></div>

  <div class="actions">
    <button class="btn" id="add-species">+ Add species</button>
  </div>

  <div class="totals-panel">
    <div class="totals-grid">
      <div class="metric"><div class="metric-label">Board feet</div><div class="metric-value" id="t-bf">0.00</div></div>
      <div class="metric"><div class="metric-label">Subtotal</div><div class="metric-value" id="t-cost">$0.00</div></div>
    </div>
    <div class="budget-row">
      <label>Project budget</label>
      <div class="budget-wrap"><span class="budget-prefix">$</span><input type="number" id="budget-input" inputmode="decimal" placeholder="0.00" min="0" step="0.01" /></div>
    </div>
    <div class="budget-alert" id="budget-alert"></div>
    <div style="text-align:right">
      <button class="btn btn-primary" id="save-btn2">Save project</button>
    </div>
  </div>

  <div class="divider"></div>
  <div style="font-size:15px;font-weight:700;margin-bottom:10px">Saved projects</div>
  <div id="saved-list"><p class="empty">No saved projects yet.</p></div>

</div>

<!-- Budget exceeded modal -->
<div class="modal-overlay" id="budget-modal">
  <div class="modal">
    <h3>Budget exceeded</h3>
    <p id="budget-modal-msg">This project is over budget. Do you want to proceed and save anyway?</p>
    <div class="modal-btns">
      <button class="btn btn-primary" id="budget-proceed">Proceed and save</button>
      <button class="btn" id="budget-cancel">Go back and adjust</button>
    </div>
  </div>
</div>

<!-- Save options modal -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <h3>Save project</h3>
    <p id="modal-msg">How would you like to save?</p>
    <div class="modal-btns">
      <button class="btn btn-primary" id="modal-overwrite">Overwrite original</button>
      <button class="btn btn-outline" id="modal-new">Save as new project</button>
      <button class="btn" id="modal-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
let species=[], projects=[], uc=0, projName='', editingId=null, pendingSaveOverwrite=undefined;
function uid(){return 'x'+(++uc);}

function boardName(i,total){return total===1?'Board':'Board '+(i+1);}

// --- localStorage ---
function persist(){
  try{localStorage.setItem('wbc_projects',JSON.stringify(projects));}catch(e){}
}
function loadPersisted(){
  try{
    const d=localStorage.getItem('wbc_projects');
    if(d) projects=JSON.parse(d);
  }catch(e){}
}

// --- Inline title ---
function makeTitle({ph,val,onSave}){
  const wrap=document.createElement('div');
  const t=document.createElement('div');
  t.className='ititle'+(val?' has-value':'');
  t.textContent=val||ph;
  const inp=document.createElement('input');
  inp.type='text';inp.className='ititle-input';inp.placeholder=ph;inp.value=val||'';
  t.addEventListener('click',()=>{t.style.display='none';inp.style.display='block';inp.focus();inp.select();});
  function done(){const v=inp.value.trim();t.textContent=v||ph;t.className='ititle'+(v?' has-value':'');inp.style.display='none';t.style.display='block';if(onSave)onSave(v);}
  inp.addEventListener('blur',done);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
  wrap.appendChild(t);wrap.appendChild(inp);
  return wrap;
}

const pWrap=makeTitle({ph:'Tap to name this project',onSave:v=>{projName=v;}});
document.getElementById('proj-wrap').appendChild(pWrap);

function clearProj(){
  projName='';editingId=null;
  const budgetEl=document.getElementById('budget-input');if(budgetEl)budgetEl.value='';
  const alertEl=document.getElementById('budget-alert');if(alertEl)alertEl.classList.remove('show');
  const t=pWrap.querySelector('.ititle'),i=pWrap.querySelector('input');
  t.textContent='Tap to name this project';t.className='ititle';i.value='';
}

function setProjName(name){
  projName=name;
  const t=pWrap.querySelector('.ititle'),i=pWrap.querySelector('input');
  t.textContent=name;t.className='ititle has-value';i.value=name;
}

// --- Save flow ---
function triggerSave(){
  if(!projName){alert('Tap the project name field and enter a name first.');return;}
  const totalCost=species.reduce((s,x)=>s+sCost(x),0);
  const budget=parseFloat(document.getElementById('budget-input').value)||0;
  if(budget>0&&totalCost>budget){
    const over=totalCost-budget;
    document.getElementById('budget-modal-msg').textContent=
      'This project is $'+over.toFixed(2)+' over your $'+budget.toFixed(2)+' budget. Proceed and save anyway?';
    pendingSaveOverwrite=editingId||null;
    document.getElementById('budget-modal').classList.add('open');
  } else {
    proceedSave();
  }
}

function proceedSave(){
  if(editingId){
    document.getElementById('modal-msg').textContent=`Editing "${projName}". How would you like to save?`;
    document.getElementById('save-modal').classList.add('open');
  } else {
    commitSave(null);
  }
}

function commitSave(overwriteId){
  const totalBF=species.reduce((s,x)=>s+sBF(x),0);
  const totalCost=species.reduce((s,x)=>s+sCost(x),0);
  const budget=parseFloat(document.getElementById('budget-input').value)||0;
  const entry={
    id:overwriteId||uid(), name:projName,
    bf:totalBF, cost:totalCost, budget:budget,
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    species:JSON.parse(JSON.stringify(species))
  };
  if(overwriteId){
    const idx=projects.findIndex(p=>p.id===overwriteId);
    if(idx>=0) projects[idx]=entry;
    else projects.unshift(entry);
  } else {
    projects.unshift(entry);
  }
  persist();
  clearProj();
  species=[];
  addSpecies();
  document.getElementById('edit-bar').style.display='none';
  renderSaved();
}

document.getElementById('budget-proceed').addEventListener('click',()=>{
  document.getElementById('budget-modal').classList.remove('open');
  proceedSave();
});
document.getElementById('budget-cancel').addEventListener('click',()=>{
  document.getElementById('budget-modal').classList.remove('open');
});
document.getElementById('budget-input').addEventListener('input',()=>{
  const totalCost=species.reduce((s,x)=>s+sCost(x),0);
  checkBudget(totalCost);
});

document.getElementById('save-btn').addEventListener('click',triggerSave);
document.getElementById('save-btn2').addEventListener('click',triggerSave);

document.getElementById('cancel-edit').addEventListener('click',()=>{
  editingId=null;
  clearProj();
  species=[];
  addSpecies();
  document.getElementById('edit-bar').style.display='none';
});

document.getElementById('modal-overwrite').addEventListener('click',()=>{
  document.getElementById('save-modal').classList.remove('open');
  commitSave(editingId);
});
document.getElementById('modal-new').addEventListener('click',()=>{
  document.getElementById('save-modal').classList.remove('open');
  editingId=null;
  commitSave(null);
});
document.getElementById('modal-cancel').addEventListener('click',()=>{
  document.getElementById('save-modal').classList.remove('open');
});

// --- Math ---
function linIn(lft,lin){return(parseFloat(lft)||0)*12+(parseFloat(lin)||0);}
function calcBF(tNum,lft,lin,w){return((parseFloat(tNum)||0)/4)*(parseFloat(w)||0)*linIn(lft,lin)/144;}
function calcCost(tNum,lft,lin,w,price){return calcBF(tNum,lft,lin,w)*(parseFloat(price)||0);}
function tBF(t){return t.boards.reduce((s,b)=>s+calcBF(t.tNum,b.lft,b.lin,b.w),0);}
function tCost(t){return t.boards.reduce((s,b)=>s+calcCost(t.tNum,b.lft,b.lin,b.w,t.price),0);}
function sBF(s){return s.thicknesses.reduce((a,t)=>a+tBF(t),0);}
function sCost(s){return s.thicknesses.reduce((a,t)=>a+tCost(t),0);}

function updateTotals(){
  const totalBF=species.reduce((s,x)=>s+sBF(x),0);
  const totalCost=species.reduce((s,x)=>s+sCost(x),0);
  document.getElementById('t-bf').textContent=totalBF.toFixed(2);
  document.getElementById('t-cost').textContent='$'+totalCost.toFixed(2);
  checkBudget(totalCost);
}

function checkBudget(totalCost){
  const budgetEl=document.getElementById('budget-input');
  const alertEl=document.getElementById('budget-alert');
  if(!budgetEl||!alertEl)return;
  const budget=parseFloat(budgetEl.value)||0;
  if(budget>0&&totalCost>budget){
    const over=totalCost-budget;
    alertEl.textContent='Over budget by $'+over.toFixed(2);
    alertEl.classList.add('show');
  } else {
    alertEl.classList.remove('show');
  }
}

function refreshNums(sid,tid){
  const s=species.find(x=>x.id===sid);if(!s)return;
  if(tid){
    const t=s.thicknesses.find(x=>x.id===tid);if(!t)return;
    t.boards.forEach(b=>{
      const be=document.getElementById('bf-'+b.id),ce=document.getElementById('bc-'+b.id);
      if(be)be.textContent=calcBF(t.tNum,b.lft,b.lin,b.w).toFixed(2)+' bf';
      if(ce)ce.textContent='$'+calcCost(t.tNum,b.lft,b.lin,b.w,t.price).toFixed(2);
    });
    const te=document.getElementById('tbf-'+tid),tce=document.getElementById('tc-'+tid);
    if(te)te.textContent=tBF(t).toFixed(2)+' bf';
    if(tce)tce.textContent='$'+tCost(t).toFixed(2);
  }
  const se=document.getElementById('sbf-'+sid),sce=document.getElementById('sc-'+sid);
  if(se)se.textContent=sBF(s).toFixed(2)+' bf';
  if(sce)sce.textContent='$'+sCost(s).toFixed(2);
  updateTotals();
}

// --- Data ---
function addSpecies(){species.push({id:uid(),name:'',thicknesses:[{id:uid(),tNum:'',price:'',boards:[{id:uid(),lft:'',lin:'',w:''}]}]});render();}
function remSpecies(sid){species=species.filter(s=>s.id!==sid);render();updateTotals();}
function addThick(sid){const s=species.find(x=>x.id===sid);if(s)s.thicknesses.push({id:uid(),tNum:'',price:'',boards:[{id:uid(),lft:'',lin:'',w:''}]});render();}
function remThick(sid,tid){const s=species.find(x=>x.id===sid);if(s)s.thicknesses=s.thicknesses.filter(t=>t.id!==tid);render();updateTotals();}
function addBoard(sid,tid){const s=species.find(x=>x.id===sid),t=s&&s.thicknesses.find(x=>x.id===tid);if(t)t.boards.push({id:uid(),lft:'',lin:'',w:''});render();}
function dupBoard(sid,tid){const s=species.find(x=>x.id===sid),t=s&&s.thicknesses.find(x=>x.id===tid);if(t&&t.boards.length>0){const b=t.boards[t.boards.length-1];t.boards.push({...b,id:uid()});}render();}
function remBoard(sid,tid,bid){const s=species.find(x=>x.id===sid),t=s&&s.thicknesses.find(x=>x.id===tid);if(t)t.boards=t.boards.filter(b=>b.id!==bid);render();updateTotals();}

function loadProjectIntoCalc(p){
  // Deep clone species data with fresh IDs so edits don't mutate the saved project
  species=JSON.parse(JSON.stringify(p.species)).map(s=>({
    ...s, id:uid(),
    thicknesses:s.thicknesses.map(t=>({
      ...t, id:uid(),
      boards:t.boards.map(b=>({...b,id:uid()}))
    }))
  }));
  editingId=p.id;
  setProjName(p.name);
  render();
  const budgetEl=document.getElementById('budget-input');
  if(budgetEl) budgetEl.value=p.budget||'';
  document.getElementById('edit-bar').style.display='flex';
  document.getElementById('edit-label').textContent='Editing: '+p.name;
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('input',function(e){
  const el=e.target,sid=el.dataset.sid,tid=el.dataset.tid,bid=el.dataset.bid,field=el.dataset.field;
  if(!sid||!field)return;
  const s=species.find(x=>x.id===sid);if(!s)return;
  if(bid){const t=s.thicknesses.find(x=>x.id===tid),b=t&&t.boards.find(x=>x.id===bid);if(b)b[field]=el.value;refreshNums(sid,tid);}
  else if(tid){const t=s.thicknesses.find(x=>x.id===tid);if(t)t[field]=el.value;refreshNums(sid,tid);}
});

document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const a=btn.dataset.action,sid=btn.dataset.sid,tid=btn.dataset.tid,bid=btn.dataset.bid;
  if(a==='rem-species')remSpecies(sid);
  else if(a==='add-thick')addThick(sid);
  else if(a==='rem-thick')remThick(sid,tid);
  else if(a==='add-board')addBoard(sid,tid);
  else if(a==='dup-board')dupBoard(sid,tid);
  else if(a==='rem-board')remBoard(sid,tid,bid);
});

document.getElementById('add-species').addEventListener('click',addSpecies);

// --- Render calculator ---
function render(){
  const list=document.getElementById('species-list');
  list.innerHTML='';
  species.forEach(s=>{
    const card=document.createElement('div');card.className='species-card';
    const hdr=document.createElement('div');hdr.className='species-header';
    const tw=makeTitle({ph:'Tap to name species',val:s.name,onSave:v=>{s.name=v;updateTotals();}});
    tw.className='title-wrap';hdr.appendChild(tw);
    const rb=document.createElement('button');rb.className='del-btn';
    rb.dataset.action='rem-species';rb.dataset.sid=s.id;
    rb.textContent='×';rb.setAttribute('aria-label','Remove species');
    hdr.appendChild(rb);card.appendChild(hdr);

    s.thicknesses.forEach(t=>{
      const blk=document.createElement('div');blk.className='t-block';
      blk.innerHTML=`
        <div class="t-meta">
          <div class="t-meta-field">Thickness
            <div class="t-wrap">
              <input type="number" inputmode="numeric" data-sid="${s.id}" data-tid="${t.id}" data-field="tNum" value="${t.tNum}" placeholder="4" min="1" step="1" />
              <span class="t-suffix">/4</span>
            </div>
          </div>
          <div class="t-meta-field">Price/bf
            <div class="p-wrap">
              <span class="p-prefix">$</span>
              <input type="number" inputmode="decimal" data-sid="${s.id}" data-tid="${t.id}" data-field="price" value="${t.price}" placeholder="0.00" min="0" step="0.01" />
            </div>
          </div>
          <button class="del-btn t-meta-del" data-action="rem-thick" data-sid="${s.id}" data-tid="${t.id}" aria-label="Remove thickness">×</button>
        </div>
        <div class="b-heads" style="margin-bottom:2px;">
          <div></div>
          <div style="grid-column:2/4;text-align:center;border-bottom:1px solid var(--border2);padding-bottom:2px;">Length</div>
          <div style="text-align:center;">Width</div>
        </div>
        <div id="bl-${t.id}"></div>
        <div class="b-actions">
          <button class="btn btn-sm" data-action="add-board" data-sid="${s.id}" data-tid="${t.id}">+ Board</button>
          <button class="btn btn-sm" data-action="dup-board" data-sid="${s.id}" data-tid="${t.id}">&#10697; Last board</button>
        </div>
        <div class="t-footer">
          <span>Total: <strong id="tbf-${t.id}">${tBF(t).toFixed(2)} bf</strong></span>
          <span>Cost: <strong id="tc-${t.id}">$${tCost(t).toFixed(2)}</strong></span>
        </div>`;
      card.appendChild(blk);
      const bl=blk.querySelector('#bl-'+t.id);
      const total=t.boards.length;
      t.boards.forEach((b,i)=>{
        const wrap=document.createElement('div');
        wrap.innerHTML=`
          <div class="b-row">
            <div class="b-label">${boardName(i,total)}</div>
            <div class="suffix-wrap"><input type="number" inputmode="numeric" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="lft" placeholder="ft" min="0" step="1" value="${b.lft}" /><span class="suffix-mark">'</span></div>
            <div class="suffix-wrap"><input type="number" inputmode="numeric" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="lin" placeholder="in" min="0" max="11" step="1" value="${b.lin}" /><span class="suffix-mark">"</span></div>
            <div style="display:flex;align-items:center;gap:4px;">
              <div class="suffix-wrap" style="flex:1"><input type="number" inputmode="decimal" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="w" placeholder="in" min="0" step="0.25" value="${b.w}" /><span class="suffix-mark">"</span></div>
              <button class="del-btn" data-action="rem-board" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" aria-label="Remove board" style="min-width:28px;flex-shrink:0">×</button>
            </div>
          </div>
          <div class="b-result">
            <span id="bf-${b.id}">${calcBF(t.tNum,b.lft,b.lin,b.w).toFixed(2)} bf</span>
            <span id="bc-${b.id}">$${calcCost(t.tNum,b.lft,b.lin,b.w,t.price).toFixed(2)}</span>
          </div>`;
        bl.appendChild(wrap);
      });
    });

    const atb=document.createElement('div');atb.style.marginTop='8px';
    atb.innerHTML=`<button class="btn btn-sm" data-action="add-thick" data-sid="${s.id}">+ Add thickness</button>`;
    card.appendChild(atb);
    const sf=document.createElement('div');sf.className='species-footer';
    sf.innerHTML=`<span>Total: <strong id="sbf-${s.id}">${sBF(s).toFixed(2)} bf</strong></span><span>Cost: <strong id="sc-${s.id}">$${sCost(s).toFixed(2)}</strong></span>`;
    card.appendChild(sf);
    list.appendChild(card);
  });
  updateTotals();
}

// --- Render saved projects ---
function renderSaved(){
  const el=document.getElementById('saved-list');
  if(!projects.length){el.innerHTML='<p class="empty">No saved projects yet.</p>';return;}
  el.innerHTML='';
  projects.forEach(p=>{
    const item=document.createElement('div');item.className='saved-item';

    // Summary row
    const summary=document.createElement('div');summary.className='saved-summary';
    summary.innerHTML=`
      <div style="flex:1;min-width:0">
        <div class="saved-name">${p.name}</div>
        <div class="saved-meta">${p.date} &nbsp;·&nbsp; ${p.bf.toFixed(2)} bf &nbsp;·&nbsp; $${p.cost.toFixed(2)}${p.budget?` &nbsp;·&nbsp; budget: $${parseFloat(p.budget).toFixed(2)}`:''}</div>
      </div>
      <span class="saved-chevron">&#8964;</span>`;
    item.appendChild(summary);

    // Action buttons
    const actions=document.createElement('div');actions.className='saved-actions';
    actions.innerHTML=`
      <button class="btn btn-sm btn-green" data-edit="${p.id}">Edit project</button>
      <button class="btn btn-sm" data-del="${p.id}" style="color:var(--red);border-color:var(--red)">Delete</button>`;
    item.appendChild(actions);

    // Detail view
    const detail=document.createElement('div');detail.className='saved-detail';
    if(p.species&&p.species.length){
      p.species.forEach(s=>{
        const sDiv=document.createElement('div');sDiv.className='detail-species';
        sDiv.innerHTML=`<div class="detail-species-name">${s.name||'Unnamed species'}</div>`;
        s.thicknesses.forEach(t=>{
          const tDiv=document.createElement('div');tDiv.className='detail-thick';
          const tHead=`${t.tNum||'—'}/4 &nbsp;·&nbsp; $${parseFloat(t.price||0).toFixed(2)}/bf`;
          let boards='';
          const total=t.boards.length;
          t.boards.forEach((b,i)=>{
            const bfVal=calcBF(t.tNum,b.lft,b.lin,b.w);
            const costVal=calcCost(t.tNum,b.lft,b.lin,b.w,t.price);
            const lStr=(parseFloat(b.lft)||0)+"' "+(parseFloat(b.lin)||0)+'"';
            const wStr=(parseFloat(b.w)||0)+'"';
            boards+=`<div class="detail-board-row">
              <span>${boardName(i,total)} &nbsp; ${lStr} × ${wStr}</span>
              <span>${bfVal.toFixed(2)} bf &nbsp; $${costVal.toFixed(2)}</span>
            </div>`;
          });
          tDiv.innerHTML=`<div class="detail-thick-head">${tHead}</div>${boards}`;
          sDiv.appendChild(tDiv);
        });
        detail.appendChild(sDiv);
      });
    }
    item.appendChild(detail);

    // Toggle expand
    summary.addEventListener('click',()=>{
      const chevron=summary.querySelector('.saved-chevron');
      const isOpen=actions.classList.contains('open');
      if(isOpen){
        actions.classList.remove('open');
        detail.classList.remove('open');
        chevron.classList.remove('open');
      } else {
        actions.classList.add('open');
        detail.classList.add('open');
        chevron.classList.add('open');
      }
    });

    // Edit
    actions.querySelector('[data-edit]').addEventListener('click',e=>{
      e.stopPropagation();
      loadProjectIntoCalc(p);
    });

    // Delete
    actions.querySelector('[data-del]').addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm(`Delete "${p.name}"?`)){
        projects=projects.filter(x=>x.id!==p.id);
        persist();
        renderSaved();
      }
    });

    el.appendChild(item);
  });
}

loadPersisted();
addSpecies();
renderSaved();
</script>
</body>
</html>
