<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wild Board Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f4f4f4;
      --bg3: #e8e8e8;
      --text: #111111;
      --text2: #555555;
      --text3: #999999;
      --border: #dddddd;
      --border2: #bbbbbb;
      --red: #cc2200;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg2: #2c2c2e;
        --bg3: #3a3a3c;
        --text: #f2f2f7;
        --text2: #aeaeb2;
        --text3: #6c6c70;
        --border: #444444;
        --border2: #666666;
        --red: #ff453a;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg2);
      color: var(--text);
      padding: 12px;
      font-size: 16px;
    }

    .wrap { max-width: 700px; margin: 0 auto; }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .sub { font-size: 13px; color: var(--text2); margin-bottom: 14px; }

    input[type=text], input[type=number] {
      font-size: 16px;
      padding: 8px 10px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type=number] { text-align: right; }
    input::placeholder { color: var(--text3); }
    input:focus { outline: 2px solid #007aff; outline-offset: -1px; }

    .btn {
      font-size: 15px; padding: 8px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg); color: var(--text);
      cursor: pointer; display: inline-flex;
      align-items: center; gap: 5px; white-space: nowrap;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-sm { font-size: 13px; padding: 6px 10px; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 20px;
      padding: 4px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      line-height: 1; min-width: 28px;
    }
    .btn-icon:active { opacity: 0.5; }
    .btn-danger { color: var(--red); }

    .project-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .project-bar > div { flex: 1; min-width: 0; }

    .ititle {
      font-size: 16px; font-weight: 600;
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      cursor: pointer; color: var(--text);
      display: block; width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ititle:hover { border-color: var(--border2); background: var(--bg2); }
    .ititle.ph { color: var(--text3); font-weight: 400; }
    .ititle-input {
      font-size: 16px; font-weight: 600;
      padding: 6px 8px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg2); color: var(--text);
      width: 100%; display: none;
    }

    .tax-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px;
      font-size: 13px; color: var(--text2);
    }
    .tax-bar-status { flex: 1; font-size: 13px; }
    .tax-bar-status strong { color: var(--text); }
    .tax-toggle-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; color: var(--text2); white-space: nowrap; padding: 2px 4px;
    }
    .tax-panel {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      margin-bottom: 10px; display: none;
    }
    .tax-panel.open { display: block; }
    .tax-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .zip-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .zip-row input { max-width: 130px; }
    .tax-note { font-size: 11px; color: var(--text3); margin-top: 8px; }

    .species-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px; margin-bottom: 10px;
    }
    .species-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px; gap: 6px;
    }
    .species-header > div { flex: 1; min-width: 0; }
    .species-footer {
      display: flex; justify-content: space-between;
      padding-top: 10px; border-top: 1px solid var(--border);
      margin-top: 8px; font-size: 13px; color: var(--text2);
    }
    .species-footer strong { color: var(--text); }

    .t-block {
      background: var(--bg2); border-radius: var(--radius);
      padding: 10px; margin-bottom: 8px;
    }
    .t-header {
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center; padding-bottom: 10px;
      border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .t-field { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
    .t-wrap {
      display: flex; align-items: center;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); overflow: hidden; width: 88px;
    }
    .t-wrap input {
      border: none; background: transparent;
      width: 44px; padding: 7px 4px 7px 8px;
      font-size: 16px; color: var(--text); text-align: right;
    }
    .t-wrap input:focus { outline: none; }
    .t-suffix { font-size: 15px; color: var(--text2); padding: 0 8px 0 4px; user-select: none; }
    .p-wrap {
      display: flex; align-items: center;
      border: 1px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); overflow: hidden; width: 106px;
    }
    .p-prefix { padding: 0 4px 0 8px; font-size: 15px; color: var(--text2); }
    .p-wrap input {
      border: none; background: transparent;
      width: 70px; padding: 7px 8px 7px 0;
      font-size: 16px; color: var(--text); text-align: right;
    }
    .p-wrap input:focus { outline: none; }
    .t-spacer { flex: 1; }
    .t-footer {
      display: flex; justify-content: space-between;
      padding-top: 8px; border-top: 1px solid var(--border);
      margin-top: 6px; font-size: 12px; color: var(--text2);
    }
    .t-footer strong { color: var(--text); }

    .b-heads {
      display: grid;
      grid-template-columns: 1fr 48px 48px 54px 72px 28px;
      gap: 4px; margin-bottom: 4px;
      font-size: 11px; color: var(--text2); text-align: center;
    }
    .b-heads > div:first-child { text-align: left; }
    .b-row {
      display: grid;
      grid-template-columns: 1fr 48px 48px 54px 72px 28px;
      gap: 4px; align-items: center; margin-bottom: 6px;
    }
    .b-row input { padding: 7px 4px; font-size: 16px; text-align: center; }
    .b-row input:first-child { text-align: left; padding: 7px 8px; }
    .b-nums { font-size: 12px; text-align: right; line-height: 1.7; color: var(--text2); font-weight: 500; }
    .b-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

    .totals-panel {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px; margin-top: 10px;
    }
    .totals-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
    .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 700; }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .saved-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px;
    }
    .saved-name { font-size: 15px; font-weight: 600; }
    .saved-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .empty { font-size: 13px; color: var(--text2); }
    .actions { margin: 10px 0; }
    .hidden { display: none !important; }

    @media (max-width: 400px) {
      .b-heads { grid-template-columns: 1fr 44px 44px 48px 66px 26px; }
      .b-row { grid-template-columns: 1fr 44px 44px 48px 66px 26px; }
      .totals-grid { grid-template-columns: 1fr 1fr; }
      .totals-grid .metric:last-child { grid-column: span 2; }
      .metric-value { font-size: 18px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <h1>Wild Board Calculator</h1>
  <p class="sub">Lumber board foot calculator by Wild Board Studio</p>

  <div class="project-bar">
    <div id="proj-wrap"></div>
    <button class="btn btn-primary" id="save-btn">Save</button>
  </div>

  <div class="tax-bar">
    <span>Sales tax</span>
    <span class="tax-bar-status" id="tax-status">Not set</span>
    <button class="tax-toggle-btn" id="tax-toggle">Set rate</button>
  </div>
  <div class="tax-panel" id="tax-panel">
    <div class="tax-options">
      <button class="btn btn-sm btn-primary" id="locate-btn">Use my location</button>
      <button class="btn btn-sm" id="zip-toggle">Enter ZIP</button>
    </div>
    <div class="zip-row hidden" id="zip-row">
      <input type="text" id="zip-input" placeholder="e.g. 84084" maxlength="5" inputmode="numeric" />
      <button class="btn btn-sm btn-primary" id="zip-btn">Look up</button>
    </div>
    <div class="tax-note">State base rate only. Local rates may vary.</div>
  </div>

  <div id="species-list"></div>

  <div class="actions">
    <button class="btn" id="add-species">+ Add species</button>
  </div>

  <div class="totals-panel">
    <div class="totals-grid">
      <div class="metric"><div class="metric-label">Board feet</div><div class="metric-value" id="t-bf">0.00</div></div>
      <div class="metric"><div class="metric-label">Subtotal</div><div class="metric-value" id="t-cost">$0.00</div></div>
      <div class="metric"><div class="metric-label">With tax</div><div class="metric-value" id="t-tax">$0.00</div></div>
    </div>
    <div style="text-align:right">
      <button class="btn btn-primary" id="save-btn2">Save project</button>
    </div>
  </div>

  <div class="divider"></div>
  <div style="font-size:15px;font-weight:700;margin-bottom:10px">Saved projects</div>
  <div id="saved-list"><p class="empty">No saved projects yet.</p></div>

</div>
<script>
let species=[],projects=[],uc=0,taxRate=0,projName='';
function uid(){return 'x'+(++uc);}

const TAXES={AL:4,AK:0,AZ:5.6,AR:6.5,CA:7.25,CO:2.9,CT:6.35,DE:0,FL:6,GA:4,HI:4,ID:6,IL:6.25,IN:7,IA:6,KS:6.5,KY:6,LA:4.45,ME:5.5,MD:6,MA:6.25,MI:6,MN:6.875,MS:7,MO:4.225,MT:0,NE:5.5,NV:6.85,NH:0,NJ:6.625,NM:5,NY:4,NC:4.75,ND:5,OH:5.75,OK:4.5,OR:0,PA:6,RI:7,SC:6,SD:4.5,TN:7,TX:6.25,UT:4.85,VT:6,VA:5.3,WA:6.5,WV:6,WI:5,WY:4,DC:6};

function makeTitle({ph,size,weight,val,onSave}){
  const wrap=document.createElement('div');
  const t=document.createElement('div');
  t.className='ititle'+(val?'':' ph');
  t.style.cssText=`font-size:${size||'16px'};font-weight:${weight||'600'}`;
  t.textContent=val||ph;
  const inp=document.createElement('input');
  inp.type='text';inp.className='ititle-input';inp.placeholder=ph;inp.value=val||'';
  inp.style.cssText=`font-size:${size||'16px'};font-weight:${weight||'600'}`;
  t.addEventListener('click',()=>{t.style.display='none';inp.style.display='block';inp.focus();inp.select();});
  function done(){const v=inp.value.trim();t.textContent=v||ph;t.className='ititle'+(v?'':' ph');inp.style.display='none';t.style.display='block';if(onSave)onSave(v);}
  inp.addEventListener('blur',done);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
  wrap.appendChild(t);wrap.appendChild(inp);
  return wrap;
}

const pWrap=makeTitle({ph:'Tap to name this project',size:'15px',weight:'400',onSave:v=>{projName=v;}});
document.getElementById('proj-wrap').appendChild(pWrap);

function clearProj(){
  projName='';
  const t=pWrap.querySelector('.ititle'),i=pWrap.querySelector('input');
  t.textContent='Tap to name this project';t.className='ititle ph';i.value='';
}

function doSave(){
  if(!projName){alert('Tap the project name field and enter a name first.');return;}
  const totalBF=species.reduce((s,x)=>s+sBF(x),0);
  const totalCost=species.reduce((s,x)=>s+sCost(x),0);
  projects.unshift({id:uid(),name:projName,bf:totalBF,cost:totalCost,tax:totalCost*(1+taxRate),date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});
  clearProj();renderSaved();
}
document.getElementById('save-btn').addEventListener('click',doSave);
document.getElementById('save-btn2').addEventListener('click',doSave);

document.getElementById('tax-toggle').addEventListener('click',function(){
  const p=document.getElementById('tax-panel');
  const open=p.classList.toggle('open');
  this.textContent=open?'Close':'Set rate';
});
function setTaxStatus(msg){document.getElementById('tax-status').innerHTML=msg;}
function applyRate(rate,loc){
  taxRate=rate/100;setTaxStatus(`<strong>${loc}</strong> — ${rate}%`);updateTotals();
  document.getElementById('tax-panel').classList.remove('open');
  document.getElementById('tax-toggle').textContent='Change';
}
document.getElementById('locate-btn').addEventListener('click',function(){
  if(!navigator.geolocation){setTaxStatus('Not supported');return;}
  setTaxStatus('Detecting...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`);
      const d=await r.json();
      const st=d.address['ISO3166-2-lvl4']?.split('-')[1]||d.address.state_code;
      const city=d.address.city||d.address.town||d.address.county||'';
      if(st&&TAXES[st]!==undefined)applyRate(TAXES[st],`${city}, ${st}`);
      else setTaxStatus('Could not determine state');
    }catch(e){setTaxStatus('Lookup failed');}
  },err=>setTaxStatus(err.code===1?'Access denied':'Location unavailable'));
});
document.getElementById('zip-toggle').addEventListener('click',function(){
  const r=document.getElementById('zip-row');
  r.classList.toggle('hidden');
  if(!r.classList.contains('hidden'))document.getElementById('zip-input').focus();
});
async function doZip(){
  const z=document.getElementById('zip-input').value.trim();
  if(!/^\d{5}$/.test(z)){setTaxStatus('Invalid ZIP');return;}
  setTaxStatus('Looking up...');
  try{
    const r=await fetch(`https://api.zippopotam.us/us/${z}`);
    if(!r.ok){setTaxStatus('ZIP not found');return;}
    const d=await r.json();
    const st=d.places[0]['state abbreviation'],city=d.places[0]['place name'];
    if(TAXES[st]!==undefined)applyRate(TAXES[st],`${city}, ${st}`);
    else setTaxStatus('State not found');
  }catch(e){setTaxStatus('Lookup failed');}
}
document.getElementById('zip-btn').addEventListener('click',doZip);
document.getElementById('zip-input').addEventListener('keydown',e=>{if(e.key==='Enter')doZip();});

function linIn(lft,lin){return(parseFloat(lft)||0)*12+(parseFloat(lin)||0);}
function calcBF(tNum,lft,lin,w){return((parseFloat(tNum)||0)/4)*(parseFloat(w)||0)*linIn(lft,lin)/144;}
function calcCost(tNum,lft,lin,w,price){return calcBF(tNum,lft,lin,w)*(parseFloat(price)||0);}
function tBF(t){return t.boards.reduce((s,b)=>s+calcBF(t.tNum,b.lft,b.lin,b.w),0);}
function tCost(t){return t.boards.reduce((s,b)=>s+calcCost(t.tNum,b.lft,b.lin,b.w,t.price),0);}
function sBF(s){return s.thicknesses.reduce((a,t)=>a+tBF(t),0);}
function sCost(s){return s.thicknesses.reduce((a,t)=>a+tCost(t),0);}

function updateTotals(){
  const totalBF=species.reduce((s,x)=>s+sBF(x),0);
  const totalCost=species.reduce((s,x)=>s+sCost(x),0);
  document.getElementById('t-bf').textContent=totalBF.toFixed(2);
  document.getElementById('t-cost').textContent='$'+totalCost.toFixed(2);
  document.getElementById('t-tax').textContent='$'+(totalCost*(1+taxRate)).toFixed(2);
}

function refreshNums(sid,tid){
  const s=species.find(x=>x.id===sid);if(!s)return;
  if(tid){
    const t=s.thicknesses.find(x=>x.id===tid);if(!t)return;
    t.boards.forEach(b=>{
      const be=document.getElementById('bf-'+b.id),ce=document.getElementById('bc-'+b.id);
      if(be)be.textContent=calcBF(t.tNum,b.lft,b.lin,b.w).toFixed(2);
      if(ce)ce.textContent='$'+calcCost(t.tNum,b.lft,b.lin,b.w,t.price).toFixed(2);
    });
    const te=document.getElementById('tbf-'+tid),tce=document.getElementById('tc-'+tid);
    if(te)te.textContent=tBF(t).toFixed(2)+' bf';
    if(tce)tce.textContent='$'+tCost(t).toFixed(2);
  }
  const se=document.getElementById('sbf-'+sid),sce=document.getElementById('sc-'+sid);
  if(se)se.textContent=sBF(s).toFixed(2)+' bf';
  if(sce)sce.textContent='$'+sCost(s).toFixed(2);
  updateTotals();
}

function addSpecies(){species.push({id:uid(),name:'',thicknesses:[{id:uid(),tNum:'4',price:'',boards:[{id:uid(),label:'',lft:'',lin:'',w:''}]}]});render();}
function remSpecies(sid){species=species.filter(s=>s.id!==sid);render();updateTotals();}
function addThick(sid){const s=species.find(x=>x.id===sid);if(s)s.thicknesses.push({id:uid(),tNum:'4',price:'',boards:[{id:uid(),label:'',lft:'',lin:'',w:''}]});render();}
function remThick(sid,tid){const s=species.find(x=>x.id===sid);if(s)s.thicknesses=s.thicknesses.filter(t=>t.id!==tid);render();updateTotals();}
function addBoard(sid,tid){const s=species.find(x=>x.id===sid),t=s&&s.thicknesses.find(x=>x.id===tid);if(t)t.boards.push({id:uid(),label:'',lft:'',lin:'',w:''});render();}
function dupBoard(sid,tid){const s=species.find(x=>x.id===sid),t=s&&s.thicknesses.find(x=>x.id===tid);if(t&&t.boards.length>0){const b=t.boards[t.boards.length-1];t.boards.push({...b,id:uid(),label:b.label?b.label+' (copy)':''});}render();}
function remBoard(sid,tid,bid){const s=species.find(x=>x.id===sid),t=s&&s.thicknesses.find(x=>x.id===tid);if(t)t.boards=t.boards.filter(b=>b.id!==bid);render();updateTotals();}

document.addEventListener('input',function(e){
  const el=e.target,sid=el.dataset.sid,tid=el.dataset.tid,bid=el.dataset.bid,field=el.dataset.field;
  if(!sid||!field)return;
  const s=species.find(x=>x.id===sid);if(!s)return;
  if(bid){const t=s.thicknesses.find(x=>x.id===tid),b=t&&t.boards.find(x=>x.id===bid);if(b)b[field]=el.value;refreshNums(sid,tid);}
  else if(tid){const t=s.thicknesses.find(x=>x.id===tid);if(t)t[field]=el.value;refreshNums(sid,tid);}
});

document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const a=btn.dataset.action,sid=btn.dataset.sid,tid=btn.dataset.tid,bid=btn.dataset.bid;
  if(a==='rem-species')remSpecies(sid);
  else if(a==='add-thick')addThick(sid);
  else if(a==='rem-thick')remThick(sid,tid);
  else if(a==='add-board')addBoard(sid,tid);
  else if(a==='dup-board')dupBoard(sid,tid);
  else if(a==='rem-board')remBoard(sid,tid,bid);
});

document.getElementById('add-species').addEventListener('click',addSpecies);

function render(){
  const list=document.getElementById('species-list');
  list.innerHTML='';
  species.forEach(s=>{
    const card=document.createElement('div');card.className='species-card';
    const hdr=document.createElement('div');hdr.className='species-header';
    const tw=makeTitle({ph:'Tap to name species',size:'16px',weight:'600',val:s.name,onSave:v=>{s.name=v;updateTotals();}});
    hdr.appendChild(tw);
    const rb=document.createElement('button');rb.className='btn-icon btn-danger';
    rb.dataset.action='rem-species';rb.dataset.sid=s.id;
    rb.textContent='×';rb.setAttribute('aria-label','Remove species');
    hdr.appendChild(rb);card.appendChild(hdr);

    s.thicknesses.forEach(t=>{
      const blk=document.createElement('div');blk.className='t-block';
      blk.innerHTML=`
        <div class="t-header">
          <div class="t-field">Thickness
            <div class="t-wrap"><input type="number" inputmode="numeric" data-sid="${s.id}" data-tid="${t.id}" data-field="tNum" value="${t.tNum}" min="1" step="1" /><span class="t-suffix">/4</span></div>
          </div>
          <div class="t-field">Price/bf
            <div class="p-wrap"><span class="p-prefix">$</span><input type="number" inputmode="decimal" data-sid="${s.id}" data-tid="${t.id}" data-field="price" value="${t.price}" placeholder="0.00" min="0" step="0.01" /></div>
          </div>
          <div class="t-spacer"></div>
          <button class="btn-icon btn-danger" data-action="rem-thick" data-sid="${s.id}" data-tid="${t.id}" aria-label="Remove thickness">×</button>
        </div>
        <div class="b-heads"><div>Label</div><div>ft</div><div>in</div><div>width</div><div style="text-align:right">bf / cost</div><div></div></div>
        <div id="bl-${t.id}"></div>
        <div class="b-actions">
          <button class="btn btn-sm" data-action="add-board" data-sid="${s.id}" data-tid="${t.id}">+ Board</button>
          <button class="btn btn-sm" data-action="dup-board" data-sid="${s.id}" data-tid="${t.id}">Dup last</button>
        </div>
        <div class="t-footer">
          <span>Total: <strong id="tbf-${t.id}">${tBF(t).toFixed(2)} bf</strong></span>
          <span>Cost: <strong id="tc-${t.id}">$${tCost(t).toFixed(2)}</strong></span>
        </div>`;
      card.appendChild(blk);
      const bl=blk.querySelector('#bl-'+t.id);
      t.boards.forEach((b,i)=>{
        const row=document.createElement('div');row.className='b-row';
        row.innerHTML=`
          <input type="text" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="label" placeholder="Board ${i+1}" value="${b.label}" />
          <input type="number" inputmode="numeric" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="lft" placeholder="ft" min="0" step="1" value="${b.lft}" />
          <input type="number" inputmode="numeric" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="lin" placeholder="in" min="0" max="11" step="1" value="${b.lin}" />
          <input type="number" inputmode="decimal" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" data-field="w" placeholder="in" min="0" step="0.25" value="${b.w}" />
          <div class="b-nums"><div id="bf-${b.id}">${calcBF(t.tNum,b.lft,b.lin,b.w).toFixed(2)}</div><div id="bc-${b.id}">$${calcCost(t.tNum,b.lft,b.lin,b.w,t.price).toFixed(2)}</div></div>
          <button class="btn-icon btn-danger" data-action="rem-board" data-sid="${s.id}" data-tid="${t.id}" data-bid="${b.id}" aria-label="Remove board">×</button>`;
        bl.appendChild(row);
      });
    });

    const atb=document.createElement('div');atb.style.marginTop='6px';
    atb.innerHTML=`<button class="btn btn-sm" data-action="add-thick" data-sid="${s.id}">+ Add thickness</button>`;
    card.appendChild(atb);
    const sf=document.createElement('div');sf.className='species-footer';
    sf.innerHTML=`<span>Total: <strong id="sbf-${s.id}">${sBF(s).toFixed(2)} bf</strong></span><span>Cost: <strong id="sc-${s.id}">$${sCost(s).toFixed(2)}</strong></span>`;
    card.appendChild(sf);
    list.appendChild(card);
  });
  updateTotals();
}

function renderSaved(){
  const el=document.getElementById('saved-list');
  if(!projects.length){el.innerHTML='<p class="empty">No saved projects yet.</p>';return;}
  el.innerHTML=projects.map(p=>`
    <div class="saved-item">
      <div>
        <div class="saved-name">${p.name}</div>
        <div class="saved-meta">${p.date} &nbsp;·&nbsp; ${p.bf.toFixed(2)} bf &nbsp;·&nbsp; $${p.cost.toFixed(2)} &nbsp;·&nbsp; $${p.tax.toFixed(2)} w/tax</div>
      </div>
      <button class="btn-icon btn-danger" data-del="${p.id}" aria-label="Delete">×</button>
    </div>`).join('');
  el.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click',()=>{projects=projects.filter(p=>p.id!==b.dataset.del);renderSaved();});
  });
}

addSpecies();
</script>
</body>
</html>
